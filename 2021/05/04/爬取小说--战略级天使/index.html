        <p>##目的<br>使用爬虫爬取小说，从而离线阅读。<br>练习R语言。<br>示例网站：<a target="_blank" rel="noopener" href="https://www.-----.com/yuedu/15111/">https://www.-----.com/yuedu/15111/</a></p>
<figure class="highlight plain"><figcaption><span>echo</span></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line">library(&quot;stringr&quot;)</span><br><span class="line">library(&quot;rvest&quot;)</span><br><span class="line">library(&#39;RCurl&#39;)</span><br><span class="line">library(&#39;curl&#39;)</span><br><span class="line">library(&#39;downloader&#39;)</span><br><span class="line">library(&#39;RSelenium&#39;)</span><br><span class="line">setwd(&#39;H:\\R\\R脚本\\爬虫&#39;)</span><br><span class="line">url &lt;- &quot;https:&#x2F;&#x2F;www.-----.com&#x2F;yuedu&#x2F;15111&#x2F;&quot;</span><br><span class="line">htmlpage &lt;- read_html(url)</span><br><span class="line">xs_chapter &lt;- htmlpage %&gt;% html_nodes(&#39;div#wrapper div.box_con div#list dl dd a&#39;) %&gt;% html_text()</span><br><span class="line">head(xs_chapter)#观察数据形式</span><br><span class="line">xs_link &lt;- htmlpage %&gt;% html_nodes(&#39;div#wrapper div.box_con div#list dl dd a&#39;) %&gt;% html_attrs()</span><br><span class="line">head(xs_link)#观察数据形式</span><br><span class="line">xs_link &lt;- paste(&quot;https:&#x2F;&#x2F;www.-----.com&quot;,unlist(xs_link),sep &#x3D; &#39;&#39;)#构建章节链接</span><br><span class="line">xs_content &lt;- cbind(xs_chapter[-(1:10)],xs_link[-(1:10)])#合并目录链接</span><br><span class="line"></span><br><span class="line">#尝试获取小说内容，并提取。</span><br><span class="line">ms_f1 &lt;- read_html(xs_content[1,2], encoding &#x3D; &quot;GB18030&quot;) %&gt;% html_nodes(&#39;div#content&#39;) %&gt;% html_text()</span><br><span class="line">ms_f2 &lt;- read_html(xs_content[2,2], encoding &#x3D; &quot;GB18030&quot;) %&gt;% html_nodes(&#39;div#content&#39;) %&gt;% html_text()</span><br><span class="line">ms_f &lt;- c(xs_content[1,1],ms_f1,xs_content[2,1],ms_f2)</span><br><span class="line">write(gsub(&quot;\u00A0&quot;,&quot; &quot;, ms_f),file &#x3D; &quot;1.txt&quot;)</span><br><span class="line"></span><br><span class="line">#自定义下载函数</span><br><span class="line">xs_down &lt;- function(x)&#123;</span><br><span class="line">  xs &lt;- c()</span><br><span class="line">  for (i in 1:length(x[,1])) &#123;</span><br><span class="line">  xm &lt;- read_html(x[i,2], encoding &#x3D; &quot;GB18030&quot;) %&gt;% html_nodes(&#39;div#content&#39;) %&gt;% html_text()</span><br><span class="line">  xs &lt;- c(xs, x[i,1], xm)</span><br><span class="line">  &#125;</span><br><span class="line">  xs</span><br><span class="line">&#125;</span><br><span class="line">#导出小说</span><br><span class="line">write(gsub(&quot;\u00A0&quot;,&quot; &quot;, xs_down(xs_content)),file &#x3D; &quot;战略级天使.txt&quot;)</span><br></pre></td></tr></table></figure>
